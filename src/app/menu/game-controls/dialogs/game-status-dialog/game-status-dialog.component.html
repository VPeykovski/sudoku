@if (gameStatus() === "solved") {
  <h2 mat-dialog-title i18n>Congratulations!</h2>
  <mat-dialog-content i18n
    >You have solved the puzzle! Do you want to start a new
    game?</mat-dialog-content
  >
  <mat-dialog-actions>
    <button mat-button [mat-dialog-close]="false" i18n>No</button>
    <button mat-button [mat-dialog-close]="true" cdkFocusInitial i18n>
      Yes
    </button>
  </mat-dialog-actions>
} @else {
  <h2 mat-dialog-title i18n>Game Status</h2>
  <mat-dialog-content i18n
    >Your current board is unsolved. Keep going!</mat-dialog-content
  >
  <mat-dialog-actions>
    <button mat-button mat-dialog-close cdkFocusInitial i18n>
      Keep going!
    </button>
  </mat-dialog-actions>
}
