<h2 mat-dialog-title i18n>Restart Game</h2>
<mat-dialog-content i18n>
  Are you sure you want to restart the game? Your current progress will be lost.
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button [mat-dialog-close]="false" i18n>No</button>
  <button mat-button [mat-dialog-close]="true" cdkFocusInitial i18n>Yes</button>
</mat-dialog-actions>
